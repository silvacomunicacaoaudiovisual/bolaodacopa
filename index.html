<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão - França x Marrocos</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container-padrao { width: 350px; box-sizing: border-box; background-color: #1a1a1a; border-radius: 20px; border: 1px solid #333; padding: 20px; margin-bottom: 20px; text-align: center; }
        h2 { color: #ff9900; margin: 5px 0; font-size: 1.2em; }
        .input-estilo { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .confronto { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
        .input-placar { width: 45px; height: 45px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; text-align: center; font-size: 1.2em; }
        button { background-color: #ff9900; color: black; padding: 15px; width: 100%; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container-padrao" id="formCard">
    <h2>VALOR R$ 5,00</h2>
    
    <!-- Campos de entrada -->
    <input type="text" id="nomeCliente" class="input-estilo" placeholder="SEU NOME">
    <input type="tel" id="telCliente" class="input-estilo" placeholder="SEU WHATSAPP (DDD + NÚMERO)">

    <div class="confronto">
        <div style="font-size: 0.7em;">FRANÇA</div>
        <input type="number" id="golsCasa" class="input-placar" min="0">
        <span style="color: #ff9900; font-weight: bold;">X</span>
        <input type="number" id="golsFora" class="input-placar" min="0">
        <div style="font-size: 0.7em;">MARROCOS</div>
    </div>

    <button id="btnConfirmar" onclick="processarCheckout()">PAGAR E CONFIRMAR</button>
    
    <div id="areaPagamento" style="display: none; margin-top: 20px;">
        <button onclick="enviarComprovante()" style="background:#25d366; color:white;">ENVIAR COMPROVANTE (WHATS)</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBK8kZiZ9WApBQf_HJVbOUJXfgOhbd3SrA", authDomain: "palpite-59a77.firebaseapp.com", databaseURL: "https://palpite-59a77-default-rtdb.firebaseio.com", projectId: "palpite-59a77", storageBucket: "palpite-59a77.firebasestorage.app", messagingSenderId: "284052798402", appId: "1:284052798402:web:2276d507fe6e9de4b9b45b" };
    firebase.initializeApp(firebaseConfig);
    const refPalpites = firebase.database().ref('palpites/');

    function processarCheckout() {
        const nome = document.getElementById('nomeCliente').value.trim();
        const tel = document.getElementById('telCliente').value.trim();
        const golsC = document.getElementById('golsCasa').value;
        const golsF = document.getElementById('golsFora').value;

        if(!nome || !tel || golsC === "" || golsF === "") return alert("Preencha todos os campos!");
        
        refPalpites.push({ 
            nome, 
            telefone: tel, 
            placar: `${golsC}x${golsF}`, 
            status: 'pendente' 
        }).then(() => {
            document.getElementById('btnConfirmar').style.display = 'none';
            document.getElementById('areaPagamento').style.display = 'block';
        });
    }
</script>
</body>
</html>
