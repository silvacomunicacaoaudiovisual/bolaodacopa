<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão - França x Marrocos</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .container-padrao { 
            width: 350px; box-sizing: border-box; background-color: #1a1a1a; 
            border-radius: 20px; border: 1px solid #333; padding: 20px; 
            margin-bottom: 20px; text-align: center;
        }

        .logo-fifa { width: 80px; }
        h2 { color: #ff9900; margin: 5px 0; font-size: 1.2em; }
        .valor-acumulado { 
            background: #332200; border: 1px solid #ffffff; color: #ffffff; 
            padding: 8px; border-radius: 10px; margin: 10px auto; 
            font-weight: bold; font-size: 0.9em; width: 200px; 
        }
        .confronto { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
        .bandeira { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #444; }
        .input-placar { width: 45px; height: 45px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; text-align: center; font-size: 1.2em; }
        button { background-color: #ff9900; color: black; padding: 15px; width: 100%; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; }
        .item-palpite { border-bottom: 1px solid #333; padding: 10px 0; display: flex; justify-content: space-between; font-size: 0.9em; align-items: center; }
        #areaPagamento { display: none; margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container-padrao" id="formCard">
    <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 10px;">
        <img src="logo.png" style="width: 100px; height: auto;">
        <img src="https://www.ogol.com.br/img/logos/edicoes/176026_imgbank_.png" class="logo-fifa">
    </div>
    <h2>VALOR R$ 5,00</h2>
    <div class="valor-acumulado">ACUMULADO: R$ <span id="valorAcumulado">0,00</span></div>
    
    <div style="color: #ffffff; font-size: 0.9em; margin: 25px 0 0 0;">09/07/2026 - 17:00</div>

    <div class="confronto">
        <div style="text-align: center;"><img src="https://img.magnific.com/fotos-premium/bandeira-francesa_565824-642.jpg?semt=ais_hybrid&w=740&q=80" class="bandeira"><div style="font-size: 0.7em;">FRANÇA</div></div>
        <input type="number" id="golsCasa" class="input-placar" min="0">
        <span style="color: #ff9900; font-weight: bold;">X</span>
        <input type="number" id="golsFora" class="input-placar" min="0">
        <div style="text-align: center;"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTB4ml0NVU3NcoNOzrcSi9SmD2qwRuNVqtvJ9YZcVybEA&s=10" class="bandeira"><div style="font-size: 0.7em;">MARROCOS</div></div>
    </div>

    <input type="text" id="nomeCliente" placeholder="DIGITE SEU NOME" style="width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; margin: 15px 0; box-sizing: border-box;">
    <button id="btnConfirmar" onclick="processarCheckout()">PAGAR E CONFIRMAR</button>
    
    <div id="areaPagamento">
        <p style="color: #ff9900; font-size: 0.9em;">Copie a chave Pix abaixo:</p>
        <div style="background: #000; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444;">
            <code id="textoChave" style="font-size: 11px; word-break: break-all; margin-right: 10px;">57bd0515-7bd4-4f18-ade5-f59377981c9c</code>
            <button onclick="copiarChave()" style="padding: 5px 10px; font-size: 0.7em; width: auto; background: #ff9900; color: black;">COPIAR</button>
        </div>
        <button onclick="enviarComprovante()" style="background:#25d366; color:white; margin-top: 15px;">ENVIAR COMPROVANTE (WHATS)</button>
    </div>
</div>

<div class="container-padrao" id="listaPalpites">
    <h3 style="color: #ff9900; margin-top: 0;">Palpites Confirmados</h3>
    <div id="containerLista"></div>
</div>

<div id="painelAdmin" style="text-align: center; margin-top: 10px;">
    <button id="btnAbrirAdmin" onclick="pedirSenha()" style="background: transparent; border: none; cursor: pointer; color: #555; padding: 0; opacity: 0.5;">
        <span class="material-icons" style="font-size: 24px;">settings</span>
    </button>
    <div id="containerAdmin" class="container-padrao" style="display: none; text-align: center;"></div>
</div>

<div style="text-align: center; margin-top: 20px; margin-bottom: 30px;">
    <a href="https://wa.me/5596984379282?text=Olá, preciso de ajuda com o Bolão!" target="_blank"
       style="display: inline-flex; align-items: center; justify-content: center; gap: 8px; background-color: #25d366; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-family: sans-serif; font-weight: bold; font-size: 0.8em; box-shadow: 0px 4px 10px rgba(0,0,0,0.3);">
       <span class="material-icons" style="font-size: 18px;">chat</span> PRECISA DE AJUDA?
    </a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBK8kZiZ9WApBQf_HJVbOUJXfgOhbd3SrA", authDomain: "palpite-59a77.firebaseapp.com", databaseURL: "https://palpite-59a77-default-rtdb.firebaseio.com", projectId: "palpite-59a77", storageBucket: "palpite-59a77.firebasestorage.app", messagingSenderId: "284052798402", appId: "1:284052798402:web:2276d507fe6e9de4b9b45b" };
    firebase.initializeApp(firebaseConfig);
    const refPalpites = firebase.database().ref('palpites/');
    const DATA_LIMITE = new Date(2026, 6, 9, 17, 0, 0); 
    const VALOR_POR_PALPITE = 5.00; 
    const SENHA_ADMIN = "7260";

    function verificarTrava() {
        if (new Date() >= DATA_LIMITE) {
            document.getElementById('btnConfirmar').disabled = true;
            document.getElementById('btnConfirmar').innerText = "ENCERRADO";
            document.getElementById('btnConfirmar').style.backgroundColor = "#555";
            document.getElementById('golsCasa').disabled = true;
            document.getElementById('golsFora').disabled = true;
            return false;
        }
        return true;
    }
    window.onload = verificarTrava;

    function pedirSenha() {
        const senha = prompt("Digite a senha do Administrador:");
        if (senha === SENHA_ADMIN) {
            document.getElementById('containerAdmin').style.display = 'block';
            document.getElementById('btnAbrirAdmin').style.display = 'none';
        } else { alert("Senha incorreta!"); }
    }

    refPalpites.on('value', (snapshot) => {
        const cL = document.getElementById('containerLista'), cA = document.getElementById('containerAdmin');
        cL.innerHTML = ''; cA.innerHTML = '<h4 style="color:#ff9900;">Aprovação de Pendentes</h4>';
        let contagemAprovados = 0, data = snapshot.val();
        for (let id in data) {
            if (data[id].status === 'aprovado') {
                cL.innerHTML += `<div class="item-palpite"><span>${data[id].nome}</span> <b>${data[id].placar}</b></div>`;
                contagemAprovados++;
            } else if (data[id].status === 'pendente') {
                cA.innerHTML += `<div class="item-palpite"><span>${data[id].nome} - ${data[id].placar}</span> <button onclick="aprovarPalpite('${id}')" style="background:#00ff00; border:none; padding:5px; cursor:pointer;">APROVAR</button></div>`;
            }
        }
        document.getElementById('valorAcumulado').innerText = (contagemAprovados * VALOR_POR_PALPITE).toFixed(2).replace('.', ',');
    });

    function processarCheckout() {
        if (!verificarTrava()) return alert("As apostas foram encerradas!");
        const nome = document.getElementById('nomeCliente').value.trim();
        const placar = `${document.getElementById('golsCasa').value}x${document.getElementById('golsFora').value}`;
        if(!nome || !document.getElementById('golsCasa').value) return alert("Preencha tudo!");
        refPalpites.push({ nome, placar, status: 'pendente', data: new Date().toLocaleString() }).then(() => {
            document.getElementById('btnConfirmar').style.display = 'none';
            document.getElementById('areaPagamento').style.display = 'block';
        });
    }

    function enviarComprovante() {
        window.open(`https://wa.me/5596984379282?text=Olá, fiz meu palpite no Bolão! Nome: ${document.getElementById('nomeCliente').value}.`, '_blank');
    }

    function copiarChave() {
        navigator.clipboard.writeText(document.getElementById("textoChave").innerText).then(() => alert("Chave copiada!"));
    }

    function aprovarPalpite(id) { firebase.database().ref('palpites/' + id).update({ status: 'aprovado' }); }
</script>
</body>
</html>
